apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: otel-demo-prod

patches:
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/component=frontend"
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
